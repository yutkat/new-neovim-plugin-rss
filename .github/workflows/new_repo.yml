# This is a basic workflow to help you get started with Actions

name: Create new posts

# Controls when the workflow will run
on:
  schedule:
    - cron: "0 0 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Expose whether the auto commit actually created a commit so that
    # downstream jobs only run when new posts were added.
    outputs:
      changed: ${{ steps.auto_commit.outputs.changes_detected }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
      # gh, jq and curl are preinstalled on GitHub-hosted ubuntu runners,
      # so no manual installation is required.
      - name: Fetch new repos
        run: ./scripts/get_new_repos.sh
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Create new blog posts
        run: ./scripts/create_post.sh
      - name: Auto commit
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Add new neovim repos
  # Do NOT remove this job. The auto commit above is pushed with the default
  # GITHUB_TOKEN, and commits pushed with GITHUB_TOKEN do not trigger the
  # push event in pages.yml. So Pages would never redeploy on new posts unless
  # we invoke it explicitly here. Gated on `changed` to skip days with no new posts.
  call-workflow:
    needs: [build]
    if: needs.build.outputs.changed == 'true'
    uses: ./.github/workflows/pages.yml
